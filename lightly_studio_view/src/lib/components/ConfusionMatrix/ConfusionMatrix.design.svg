<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 940" width="1440" height="940" role="img">
<title>ConfusionMatrix (OD) — design reference</title>
<desc>Object detection confusion matrix prototype. Rows = ground truth, columns = predictions. Green diagonal = TPs, red off-diagonal = FPs and FNs. Synthetic axes labelled "(no ground truth)" and "(no prediction)".</desc>
<g id="background"><rect x="0" y="0" width="1440" height="940" fill="#0a0a0a"/></g>
<g id="header">
<text id="title" x="120" y="118" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="500" fill="#f3f4f6">Confusion matrix</text>
<text id="subtitle" x="120" y="146" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">Object detection · 528 pairings</text>
<g id="view-toggle">
<rect x="1200" y="98" width="140" height="32" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
<rect x="1202" y="100" width="68" height="28" rx="6" fill="#2a2a2a"/>
<text x="1236" y="118" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#f3f4f6" text-anchor="middle">Counts</text>
<text x="1304" y="118" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Row %</text>
</g>
</g>
<g id="threshold-controls">
<rect x="120" y="180" width="1220" height="60" rx="8" fill="#141414" stroke="#1f1f1f"/>
<g id="confidence-slider">
<text x="140" y="216" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#9ca3af">Confidence ≥</text>
<rect x="260" y="208" width="380" height="4" rx="2" fill="#2a2a2a"/>
<rect x="260" y="208" width="95" height="4" rx="2" fill="#4b5563"/>
<circle cx="355" cy="210" r="9" fill="#f3f4f6" stroke="#0a0a0a" stroke-width="2"/>
<text x="660" y="216" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#f3f4f6">0.25</text>
</g>
<g id="iou-slider">
<text x="740" y="216" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#9ca3af">IoU ≥</text>
<rect x="820" y="208" width="380" height="4" rx="2" fill="#2a2a2a"/>
<rect x="820" y="208" width="190" height="4" rx="2" fill="#4b5563"/>
<circle cx="1010" cy="210" r="9" fill="#f3f4f6" stroke="#0a0a0a" stroke-width="2"/>
<text x="1220" y="216" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#f3f4f6">0.50</text>
</g>
</g>
<g id="axis-labels">
