# Alembic config for lightly_studio Postgres migrations.
# Run from the lightly_studio package root; set LIGHTLY_STUDIO_DATABASE_URL for CLI use.

[alembic]
# Migration scripts (env.py, versions/). %(here)s is this file's directory.
script_location = %(here)s/src/lightly_studio/migrations
# Prefix revision filenames with epoch for chronological sorting.
file_template = %(epoch)d_%(rev)s_%(slug)s
# Project root on sys.path so `lightly_studio` imports work when run from here.
prepend_sys_path = .
# Database URL comes from LIGHTLY_STUDIO_DATABASE_URL (see migrations/env.py).
