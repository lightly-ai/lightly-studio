<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 700" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise Deployment Topology</title>
  <desc id="desc">Enterprise deployment topology showing customer environment on the left and the enterprise application environment on the right.</desc>
  <defs>
    <style>
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; ry: 18; }
      .node-blue { fill: #e0f2fe; stroke: #38bdf8; stroke-width: 2; rx: 14; ry: 14; }
      .node-green { fill: #dcfce7; stroke: #4ade80; stroke-width: 2; rx: 14; ry: 14; }
      .node-violet { fill: #f3e8ff; stroke: #a78bfa; stroke-width: 2; rx: 14; ry: 14; }
      .node-slate { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 2; rx: 14; ry: 14; }
      .node-gold { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 14; ry: 14; }
      .panel-title { fill: #334155; font-family: Arial, sans-serif; font-size: 22px; font-weight: 700; }
      .label { fill: #0f172a; font-family: Arial, sans-serif; font-size: 21px; font-weight: 700; }
      .small { fill: #334155; font-family: Arial, sans-serif; font-size: 17px; }
      .edge-label { fill: #334155; font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; }
    </style>
  </defs>

  <rect class="panel" x="30" y="20" width="320" height="660"/>
  <text class="panel-title" x="56" y="56">Customer Environment</text>

  <rect class="node-blue" x="70" y="90" width="240" height="78"/>
  <text class="label" x="190" y="136" text-anchor="middle">User in Browser</text>

  <rect class="node-gold" x="70" y="270" width="240" height="90"/>
  <text class="label" x="190" y="314" text-anchor="middle">Customer Storage</text>
  <text class="small" x="190" y="341" text-anchor="middle">local files or cloud bucket</text>

  <rect class="node-green" x="70" y="500" width="240" height="92"/>
  <text class="label" x="190" y="545" text-anchor="middle">Admin Python Client</text>
  <text class="small" x="190" y="572" text-anchor="middle">ls.connect()</text>

  <rect class="panel" x="390" y="20" width="900" height="660"/>
  <text class="panel-title" x="416" y="56">Enterprise Application Environment</text>

  <rect class="node-blue" x="500" y="90" width="240" height="78"/>
  <text class="label" x="620" y="136" text-anchor="middle">Reverse Proxy</text>

  <rect class="node-violet" x="840" y="90" width="240" height="78"/>
  <text class="label" x="960" y="136" text-anchor="middle">Workspace UI</text>

  <rect class="node-green" x="500" y="270" width="240" height="90"/>
  <text class="label" x="620" y="314" text-anchor="middle">LightlyStudio Service</text>

  <rect class="node-green" x="840" y="270" width="240" height="90"/>
  <text class="label" x="960" y="314" text-anchor="middle">Auth Service</text>

  <rect class="node-slate" x="500" y="500" width="240" height="78"/>
  <text class="label" x="620" y="546" text-anchor="middle">Datasets DB</text>

  <rect class="node-slate" x="840" y="500" width="240" height="78"/>
  <text class="label" x="960" y="546" text-anchor="middle">Auth User DB</text>

  <line x1="310" y1="129" x2="500" y2="129" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

  <line x1="740" y1="129" x2="840" y2="129" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

  <line x1="620" y1="168" x2="620" y2="270" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

  <line x1="740" y1="129" x2="840" y2="315" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <text class="edge-label" x="782" y="230">JWT</text>

  <line x1="620" y1="360" x2="620" y2="500" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

  <line x1="960" y1="360" x2="960" y2="500" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

  <line x1="500" y1="315" x2="310" y2="315" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <text class="edge-label" x="405" y="292" text-anchor="middle">stream media</text>

  <line x1="190" y1="500" x2="190" y2="360" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <text class="edge-label" x="214" y="438">read / index data</text>

  <line x1="310" y1="546" x2="500" y2="539" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <text class="edge-label" x="405" y="515" text-anchor="middle">shared metadata</text>
</svg>
