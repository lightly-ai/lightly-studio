<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise Deployment Topology</title>
  <desc id="desc">Enterprise deployment topology showing the same Frontend, Backend API, and Datasets DB core components as OSS, with an Auth Service added around them.</desc>
  <defs>
    <style>
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; ry: 18; }
      .node-blue { fill: #e0f2fe; stroke: #38bdf8; stroke-width: 2; rx: 14; ry: 14; }
      .node-green { fill: #dcfce7; stroke: #4ade80; stroke-width: 2; rx: 14; ry: 14; }
      .node-violet { fill: #f3e8ff; stroke: #a78bfa; stroke-width: 2; rx: 14; ry: 14; }
      .node-slate { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 2; rx: 14; ry: 14; }
      .node-gold { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 14; ry: 14; }
      .panel-title { fill: #334155; font-family: Arial, sans-serif; font-size: 22px; font-weight: 700; }
      .label { fill: #0f172a; font-family: Arial, sans-serif; font-size: 21px; font-weight: 700; }
      .small { fill: #334155; font-family: Arial, sans-serif; font-size: 17px; }
      .edge-label { fill: #334155; font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; }
    </style>
  </defs>

  <rect class="panel" x="30" y="20" width="330" height="660"/>
  <text class="panel-title" x="56" y="56">Customer Environment</text>

  <rect class="node-blue" x="65" y="150" width="260" height="82"/>
  <text class="label" x="195" y="199" text-anchor="middle">User in Browser</text>

  <rect class="node-gold" x="65" y="330" width="260" height="100"/>
  <text class="label" x="195" y="378" text-anchor="middle">Customer Storage</text>
  <text class="small" x="195" y="407" text-anchor="middle">local files or cloud bucket</text>

  <rect class="node-green" x="65" y="530" width="260" height="100"/>
  <text class="label" x="195" y="578" text-anchor="middle">Python API / Scripts</text>
  <text class="small" x="195" y="607" text-anchor="middle">admin workflows via ls.connect()</text>

  <rect class="panel" x="390" y="20" width="860" height="660"/>
  <text class="panel-title" x="416" y="56">Enterprise Application Environment</text>

  <rect class="panel" x="770" y="90" width="380" height="590"/>
  <text class="panel-title" x="796" y="126">LightlyStudio Core</text>

  <rect class="node-violet" x="470" y="150" width="230" height="82"/>
  <text class="label" x="585" y="199" text-anchor="middle">Auth Service</text>

  <rect class="node-blue" x="820" y="150" width="280" height="82"/>
  <text class="label" x="960" y="199" text-anchor="middle">Frontend</text>

  <rect class="node-green" x="820" y="330" width="280" height="100"/>
  <text class="label" x="960" y="378" text-anchor="middle">Backend API</text>

  <rect class="node-slate" x="820" y="530" width="280" height="100"/>
  <text class="label" x="960" y="578" text-anchor="middle">Datasets DB</text>

  <line x1="325" y1="191" x2="470" y2="191" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

  <line x1="700" y1="191" x2="820" y2="191" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

  <line x1="960" y1="232" x2="960" y2="330" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

  <line x1="960" y1="430" x2="960" y2="530" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

  <line x1="820" y1="380" x2="325" y2="380" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

  <line x1="195" y1="530" x2="195" y2="430" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

  <line x1="325" y1="580" x2="820" y2="580" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
</svg>
