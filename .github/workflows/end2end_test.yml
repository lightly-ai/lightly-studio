name: End2End Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: --max-old-space-size=4096
  DATASET_PATH: $(pwd)/datasets
  E2E_BASE_URL: http://localhost:8001
  LIGHTLY_STUDIO_LICENSE_KEY: ${{ secrets.MUNDIG_LICENSE_KEY }}


jobs:
  prepare-caches:
    name: Build Cache
    runs-on: ubuntu-latest
    outputs:
      file-hash: ${{ steps.file-hash.outputs.hash }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Authenticate to download lightly-edge-sdk.
      - name: Authenticate with GCP
        uses: 'google-github-actions/auth@v2'
        with:
          project_id: boris-250909
          credentials_json: ${{ secrets.GCP_LIGHTLY_STUDIO_CI_READONLY }}

      - name: Compute cache key file hash
        id: file-hash
        run: >-
          echo "hash=${{ hashFiles(
            '.github/workflows/end2end_test.yml',
            'lightly_studio/e2e-tests/**/*',
            'lightly_studio/src/**/*',
            'lightly_studio/pyproject.toml',
            'lightly_studio_view/e2e/**/*',
            'lightly_studio_view/src/**/*',
            'lightly_studio_view/public/**/*',
            'lightly_studio_view/package.json',
            'lightly_studio_view/package-lock.json'
          ) }}" >> $GITHUB_OUTPUT

      - name: Cache build
        id: cache-build
        uses: actions/cache@v4
        with:
          lookup-only: true
          path: &cache-build-path |
            lightly_studio_view/build
            lightly_studio/src/lightly_studio/dist_lightly_studio_view_app
          key: python-build-${{ steps.file-hash.outputs.hash }}

      - name: Cache Playwright browsers
        id: cache-playwright-browsers
        uses: actions/cache@v4
        with:
          path: &cache-playwright-browsers-path ~/.cache/ms-playwright
          key: &cache-playwright-browsers-key >-
            playwright-${{ runner.os }}-${{ hashFiles(
                'lightly_studio_view/package-lock.json'
              )
            }}

      - name: Cache example dataset
        id: cache-example-dataset
        uses: actions/cache@v4
        with:
          # No need to download a cached version in cache preparation step
          lookup-only: true
          path: &cache-example-dataset-path lightly_studio/datasets
          # Manually update the cache key to invalidate caches when files relevant to the CI change
          # in the dataset_examples repo.
          key: &cache-example-dataset-key example-dataset-2026-03-09

      ### Setup steps for the workflow ###
      - name: Set Up Python
        if: steps.cache-build.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Set Up Uv
        if: steps.cache-build.outputs.cache-hit != 'true'
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.17"
          enable-cache: true

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'lightly_studio_view/.nvmrc'
          cache: 'npm'
          cache-dependency-path: lightly_studio_view/package-lock.json

      - name: Install lightly_studio_view dependencies
        if: steps.cache-build.outputs.cache-hit != 'true'
        working-directory: lightly_studio_view
        run: npm ci

      ### Build caches ###

      # Always ensure system packages for browsers are present on Ubuntu
      - name: Install Playwright system dependencies
        if: steps.cache-build.outputs.cache-hit != 'true'
        working-directory: lightly_studio_view
        run: npx playwright install-deps chromium

      # Only download browser binaries when cache misses; otherwise reuse cache
      - name: Install Playwright browsers
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        working-directory: lightly_studio_view
        run: npx playwright install chromium

      - name: Download example dataset
        if: steps.cache-example-dataset.outputs.cache-hit != 'true'
        run: make download-example-dataset

      - name: Export schema and generate version file from backend
        if: steps.cache-build.outputs.cache-hit != 'true'
        working-directory: lightly_studio
        run: |
          make export-schema
          make export-version

      ### Building steps for the workflow ###
      - name: Build the ui application
        if: steps.cache-build.outputs.cache-hit != 'true'
        working-directory: lightly_studio_view
        run: |
          rm -rf build
          npm run build

      - name: Copy the built ui app to lightly_studio source folder
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: |
          rm -rf lightly_studio/src/lightly_studio/dist_lightly_studio_view_app
          cp -r lightly_studio_view/build/ lightly_studio/src/lightly_studio/dist_lightly_studio_view_app

  end-to-end:
    name: End2End Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: prepare-caches
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: General
            index_script: index_general.py
            playwright_project: general
            success_marker: .e2e-success-general
            success_key: e2e-success-general
            artifact_name: Playwright Report (General)
            postgres: false
          - name: Videos
            index_script: index_video.py
            playwright_project: videos
            success_marker: .e2e-success-videos
            success_key: e2e-success-videos
            artifact_name: Playwright Report (Videos)
            postgres: false
          - name: Groups
            index_script: index_groups.py
            playwright_project: groups
            success_marker: .e2e-success-groups
            success_key: e2e-success-groups
            artifact_name: Playwright Report (Groups)
            postgres: false
          - name: General Postgres
            index_script: index_general.py
            playwright_project: general
            success_marker: .e2e-success-general-postgres
            success_key: e2e-success-general-postgres
            artifact_name: Playwright Report (General Postgres)
            postgres: true
          - name: Videos Postgres
            index_script: index_video.py
            playwright_project: videos
            success_marker: .e2e-success-videos-postgres
            success_key: e2e-success-videos-postgres
            artifact_name: Playwright Report (Videos Postgres)
            postgres: true

    services:
      postgres:
        image: ${{ matrix.postgres && 'pgvector/pgvector:0.8.1-pg18-bookworm' || '' }}
        env:
          POSTGRES_USER: lightly
          POSTGRES_PASSWORD: lightly
          POSTGRES_DB: lightly_studio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lightly -d lightly_studio"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Authenticate to download lightly-edge-sdk.
      - name: Authenticate with GCP
        uses: 'google-github-actions/auth@v2'
        with:
          project_id: boris-250909
          credentials_json: ${{ secrets.GCP_LIGHTLY_STUDIO_CI_READONLY }}

      - name: Check e2e success cache
        id: cache-success
        uses: actions/cache@v4
        with:
          lookup-only: true
          path: ${{ matrix.success_marker }}
          key: ${{ matrix.success_key }}-${{ needs.prepare-caches.outputs.file-hash }}

      ### Restore caches ###

      - name: Cache build
        if: steps.cache-success.outputs.cache-hit != 'true'
        id: cache-build
        uses: actions/cache@v4
        with:
          fail-on-cache-miss: true
          path: *cache-build-path
          key: python-build-${{ needs.prepare-caches.outputs.file-hash }}

      - name: Cache Playwright browsers
        if: steps.cache-success.outputs.cache-hit != 'true'
        id: cache-playwright-browsers
        uses: actions/cache@v4
        with:
          fail-on-cache-miss: true
          path: *cache-playwright-browsers-path
          key: *cache-playwright-browsers-key

      - name: Cache example dataset
        if: steps.cache-success.outputs.cache-hit != 'true'
        id: cache-example-dataset
        uses: actions/cache@v4
        with:
          fail-on-cache-miss: true
          path: *cache-example-dataset-path
          key: *cache-example-dataset-key

      ### Setup ###

      - name: Set Up Python
        if: steps.cache-success.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Set Up Uv
        if: steps.cache-success.outputs.cache-hit != 'true'
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.17"
          enable-cache: true

      - name: Set Up Node.js
        if: steps.cache-success.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: 'lightly_studio_view/.nvmrc'
          cache: 'npm'
          cache-dependency-path: lightly_studio_view/package-lock.json

      - name: Install lightly_studio_view dependencies
        if: steps.cache-success.outputs.cache-hit != 'true'
        working-directory: lightly_studio_view
        run: npm ci

      - name: Install lightly_studio dependencies
        if: steps.cache-success.outputs.cache-hit != 'true'
        working-directory: lightly_studio
        run: make install-optional-deps

      ### Run e2e tests ###

      - name: Index dataset with using lightly_studio pypi package
        if: steps.cache-success.outputs.cache-hit != 'true'
        working-directory: lightly_studio
        # TODO(Michal, 10/2025): Starting up the server redownloads the embedding model. Consider caching it.
        run: |
          if [ "${{ matrix.postgres }}" = "true" ]; then
            LIGHTLY_STUDIO_DATABASE_URL=postgresql://lightly:lightly@localhost:5432/lightly_studio \
              uv run e2e-tests/${{ matrix.index_script }} > server.log 2>&1 &
          else
            uv run e2e-tests/${{ matrix.index_script }} > server.log 2>&1 &
          fi
          echo "SERVER_PID=$!" >> $GITHUB_ENV
        id: server

      - name: Wait for the server to start
        if: steps.cache-success.outputs.cache-hit != 'true'
        timeout-minutes: 6
        working-directory: lightly_studio
        run: |
          echo "Waiting for the server to become available..."
          timeout=360
          elapsed=0
          interval=5

          while [ $elapsed -lt $timeout ]; do
            if curl -s -f ${E2E_BASE_URL}/healthz > /dev/null 2>&1; then
              echo "✅ Server is up and running after ${elapsed} seconds!"
              break
            fi
            if ! ps -p ${{ env.SERVER_PID }} > /dev/null; then
              echo "❌ Server process has exited unexpectedly."
              exit 1
            fi

            echo "⏳ Server not ready yet, waiting... (${elapsed}/${timeout} seconds)"
            tail -n 1 server.log
            echo
            sleep $interval
            elapsed=$((elapsed + interval))
          done

          if [ $elapsed -ge $timeout ]; then
            echo "❌ Timed out waiting for server to become available"
            exit 1
          fi

      ### Running end-to-end tests ###
      - name: Run end-to-end tests for indexed dataset
        if: steps.cache-success.outputs.cache-hit != 'true'
        working-directory: lightly_studio_view
        run: npx playwright test --reporter=html --trace=on --project=${{ matrix.playwright_project }}
        timeout-minutes: 10

      - name: Generate performance summary
        if: steps.cache-success.outputs.cache-hit != 'true' && (matrix.playwright_project == 'general' || matrix.playwright_project == 'videos')
        working-directory: lightly_studio_view
        run: |
          if [ -f performance-metrics.json ]; then
            echo "## 🚀 Performance Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Test | Render Time | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-------------|--------|" >> $GITHUB_STEP_SUMMARY

            node -e "
              const metrics = require('./performance-metrics.json');
              metrics.forEach(m => {
                const status = m.passed ? '✅ Pass' : '❌ Fail';
                const time = Math.round(m.median);
                console.log(\`| \${m.test} | \${time}ms | \${status} |\`);
              });
            " >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Max render time: 5000ms_" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No performance metrics found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload performance metrics
        if: steps.cache-success.outputs.cache-hit != 'true' && (matrix.playwright_project == 'general' || matrix.playwright_project == 'videos')
        uses: actions/upload-artifact@v4
        with:
          name: performance-metrics-${{ matrix.name }}
          path: lightly_studio_view/performance-metrics.json
          if-no-files-found: warn

      - name: Create e2e success marker
        if: steps.cache-success.outputs.cache-hit != 'true'
        run: touch ${{ matrix.success_marker }}

      - name: Save e2e success marker
        if: steps.cache-success.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ matrix.success_marker }}
          key: ${{ matrix.success_key }}-${{ needs.prepare-caches.outputs.file-hash }}

      ### Cleanup steps ###
      - name: Show server logs after failure
        if: failure() && steps.cache-success.outputs.cache-hit != 'true'
        working-directory: lightly_studio
        run: |
          echo "Server logs:"
          cat server.log

      - name: Upload Playwright report after failure
        uses: actions/upload-artifact@v4
        if: failure() && steps.cache-success.outputs.cache-hit != 'true'
        with:
          name: ${{ matrix.artifact_name }}
          path: lightly_studio_view/playwright-report
          retention-days: 5

      - name: Stop lightly_studio application running in background
        if: always() && steps.cache-success.outputs.cache-hit != 'true'
        run: |
          kill ${{ env.SERVER_PID }} || true

  success-check:
    name: End2End Success Check
    runs-on: ubuntu-latest
    needs:
      - prepare-caches
      - end-to-end
    if: always()
    steps:
      - name: Check failure
        if: needs.end-to-end.result != 'success'
        run: |
          echo "❌ End-to-End tests did not complete successfully."
          exit 1
